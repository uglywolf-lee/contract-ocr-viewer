<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>임대인 관리 — 임차인 시스템</title>
<style>
:root{--bg:#0f1117;--panel:#1a1d27;--input:#252838;--border:#2e3143;--accent:#6c8cff;--text:#e1e4ed;--muted:#6b7094;--danger:#ff5c5c;--success:#4ade80;--amber:#fbbf24;--radius:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.header h1{font-size:18px;font-weight:700;color:var(--accent)}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap}
.stat-box{text-align:center;padding:4px 12px;background:var(--input);border-radius:var(--radius);min-width:90px}
.stat-box .num{font-size:18px;font-weight:700;color:var(--accent)}
.stat-box .lbl{font-size:10px;color:var(--muted)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:12px;border-bottom:1px solid var(--border)}
.search-box{display:flex;gap:8px;margin-bottom:8px}
.search-box input{flex:1;padding:8px 12px;background:var(--input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.btn{padding:7px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn:hover{opacity:.85}.btn-primary{background:var(--accent);color:#fff}.btn-sm{padding:4px 10px;font-size:11px}.btn-danger{background:var(--danger);color:#fff}.btn-success{background:var(--success);color:#000}
.tenant-list{flex:1;overflow-y:auto;padding:4px}
.tenant-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.15s;margin-bottom:2px}
.tenant-item:hover{background:var(--input)}.tenant-item.active{background:var(--accent);color:#000}
.ti-name{font-size:13px;font-weight:600}.ti-sub{font-size:11px;color:var(--muted);margin-top:2px}
.main{flex:1;overflow-y:auto;padding:0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;transition:.15s;border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tc-panel{padding:24px;display:none}.tc-panel.active{display:block}
.sec{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.sec h3{font-size:14px;color:var(--accent);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fl input,.fl select,.fl textarea{padding:9px 12px;background:var(--input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent)}.fl textarea{resize:vertical;min-height:60px}
.fa{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{text-align:left;padding:8px 12px;background:var(--input);color:var(--muted);font-weight:600;font-size:11px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.dt td{padding:8px 12px;border-bottom:1px solid var(--border)}.dt tr:hover td{background:rgba(108,140,255,.06)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.bg{background:rgba(74,222,128,.15);color:#4ade80}.ba{background:rgba(251,191,36,.15);color:#fbbf24}
.br{background:rgba(255,92,92,.15);color:#ff5c5c}.bb{background:rgba(108,140,255,.15);color:#6c8cff}
.es{text-align:center;padding:60px 20px;color:var(--muted)}.es .icon{font-size:48px;margin-bottom:12px}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10;display:none;align-items:center;justify-content:center}
#modal-content{background:var(--panel);padding:24px;border-radius:8px;min-width:400px;margin:auto;border:1px solid var(--border)}
</style></head>
<body>

<div class="header">
  <h1>🏠 임대인 임차인 관리</h1>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="tenant-header">
      <div class="search-box">
        <input id="searchInput" placeholder="임차인 검색..." onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn btn-primary" onclick="doSearch()">검색</button>
        <button class="btn btn-success" onclick="openModal('tenant')">＋추가</button>
      </div>
    </div>
    <div class="tenant-list" id="tenantList"></div>
  </div>

  <div class="main" id="mainPanel">
    <div class="es" id="emptyState"><div class="icon">👆</div><div>임차인을 선택하세요</div></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-content">
    <h3 id="modal-title" style="margin:0 0 12px;font-size:16px"></h3>
    <div id="modal-body"></div>
  </div>
</div>

<script src="/tenant_manager.js"></script>
</body></html>
